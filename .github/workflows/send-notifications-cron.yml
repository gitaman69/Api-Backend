name: Send Notifications Cron

on:
  schedule:
    # Times are UTC, offset a few minutes off the hour since GitHub Actions
    # can delay or drop schedules landing exactly on :00 (its busiest slot).
    # 03:07/08:07/14:07 UTC = ~8:37/13:37/19:37 IST.
    - cron: "7 3 * * *"
    - cron: "7 8 * * *"
    - cron: "7 14 * * *"
    # Extra test slot: 05:35 UTC = 11:05 IST.
    - cron: "35 5 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-notifications cron endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          status=$(curl -s -o response.json -w "%{http_code}" -X POST \
            "$BACKEND_URL/api/cron/send-notifications" \
            -H "Authorization: Bearer $CRON_SECRET")
          cat response.json
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Request failed with status $status"
            exit 1
          fi
